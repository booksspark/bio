<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1d3461;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-pale: #f5e6b8;
    --text-main: #f0e6d3;
    --text-muted: #9ba8bb;
    --card-bg: rgba(29, 52, 97, 0.55);
    --card-border: rgba(201, 168, 76, 0.25);
  }

  body {
    min-height: 100vh;
    background-color: var(--navy);
    font-family: 'Cairo', sans-serif;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Geometric background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(60deg, rgba(201,168,76,0.04) 0, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 50%),
      repeating-linear-gradient(-60deg, rgba(201,168,76,0.04) 0, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 50%),
      repeating-linear-gradient(0deg, rgba(201,168,76,0.03) 0, rgba(201,168,76,0.03) 1px, transparent 1px, transparent 50%);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Ornament top */
  .ornament {
    width: 120px;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    margin-bottom: 1.2rem;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Amiri', serif;
    font-size: 2.4rem;
    color: var(--gold-light);
    box-shadow: 0 0 0 6px rgba(201,168,76,0.1);
  }

  /* Header text */
  .channel-name {
    font-family: 'Amiri', serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gold-light);
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }

  .channel-tagline {
    font-size: 0.88rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 0.5rem;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.4rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to left, transparent, rgba(201,168,76,0.4), transparent);
  }

  .divider-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  /* Section label */
  .section-label {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    text-align: center;
    opacity: 0.85;
  }

  /* Link cards */
  .links-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.1rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text-main);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
  }

  .link-card:hover {
    transform: translateY(-2px);
    border-color: rgba(201,168,76,0.55);
    background: rgba(29, 52, 97, 0.75);
  }

  .link-card:active {
    transform: translateY(0px);
  }

  .link-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
  }

  .link-text {
    flex: 1;
    min-width: 0;
  }

  .link-title {
    font-size: 0.93rem;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .link-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.2;
  }

  .link-arrow {
    color: var(--gold);
    opacity: 0.6;
    font-size: 1rem;
    flex-shrink: 0;
  }

  /* Main channel card (featured) */
  .link-card.featured {
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.08);
  }

  .link-card.featured .link-title {
    color: var(--gold-light);
  }

  /* Social row */
  .social-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.5rem 1rem;
    border-radius: 50px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.78rem;
    transition: color 0.18s, border-color 0.18s;
  }

  .social-btn:hover {
    color: var(--gold-light);
    border-color: rgba(201,168,76,0.5);
  }

  .social-btn svg {
    width: 14px;
    height: 14px;
  }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    font-size: 0.72rem;
    color: rgba(155,168,187,0.45);
    text-align: center;
  }
</style>
